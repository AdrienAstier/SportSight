spring:
  application:
    name: sportsight-api
  security:
    user:
      name: user
      password: password
      roles: USER

  datasource:
    url: jdbc:mysql://localhost:3306/sportsight?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 9090