jwt:
  # En production : JWT_SECRET=$(openssl rand -base64 64)
  secret: ${JWT_SECRET:ZGV2LW9ubHktc2VjcmV0LWtleS1mb3Itand0LWF1dGhlbnRpY2F0aW9uLWluLXNwb3J0c2lnaHQ=}
  access-token-expiration: 900000      # 15 minutes (ms)
  refresh-token-expiration: 604800000  # 7 jours (ms)

app:
  cors:
    # En production : CORS_ALLOWED_ORIGINS=https://app.sportsight.fr
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  cookie:
    # En production : COOKIE_SECURE=true
    secure: ${COOKIE_SECURE:false}
    same-site: Strict
  security:
    # En production : ADMIN_DEFAULT_PASSWORD=<mot-de-passe-fort>
    admin-default-password: ${ADMIN_DEFAULT_PASSWORD:changeme}

spring:
  application:
    name: sportsight-api
  autoconfigure:
    exclude:
      - org.springdoc.core.configuration.SpringDocHateoasConfiguration
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/sportsight?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

server:
  port: ${PORT:9090}