<nav class="sidebar" [class.collapsed]="collapsed()">
  <!-- Logo -->
  <div class="sidebar-header">
    <div class="sidebar-logo">
      @if (collapsed()) {
        <img src="logo-icon.svg" alt="SportSight" class="logo-img-icon" />
      } @else {
        <img src="logo.svg" alt="SportSight" class="logo-img-full" />
      }
    </div>
    <button class="collapse-btn" (click)="toggleCollapse.emit()" [title]="collapsed() ? 'Étendre' : 'Réduire'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        @if (collapsed()) {
          <polyline points="9 18 15 12 9 6"/>
        } @else {
          <polyline points="15 18 9 12 15 6"/>
        }
      </svg>
    </button>
  </div>

  <!-- Nav -->
  <div class="sidebar-nav">
    @if (!collapsed()) { <p class="nav-section-label">Navigation</p> }
    @for (item of navItems; track item.path) {
      <a [routerLink]="item.path" routerLinkActive="active" class="nav-item" [title]="collapsed() ? item.label : ''">
        <span class="nav-icon" [innerHTML]="getIcon(item.icon)"></span>
        @if (!collapsed()) { <span class="nav-label">{{ item.label }}</span> }
      </a>
    }
  </div>

  <!-- Footer -->
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar">{{ initials() }}</div>
      @if (!collapsed()) {
        <div class="user-details">
          <p class="user-name">{{ username() }}</p>
          <p class="user-role">Analyste</p>
        </div>
      }
    </div>
    <button class="logout-btn" (click)="logout()" title="Déconnexion">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</nav>
